<div class="container">
  <h2>Lista de Productos</h2>

    <div class="mb-3">
        <button class="btn btn-success" (click)="createProduct()">Crear Producto</button>
    </div>

  <table>
    <thead>
      <tr>
        <th>SKU</th>
        <th>Nombre</th>
        <th>Descripción</th>
        <th>Imagen</th>
        <th>Precio</th>
        <th>Stock</th>
        <th>Opciones</th>
      </tr>
    </thead>

    <tbody>
    @for (item of items; track item.id) {
        <tr>
        <td>{{item.sku}}</td>
        <td>{{item.name}}</td>
        <td>{{item.description}}</td>
        <td>
          <img 
            [src]="item.picture"
            width="80">
        </td>
        <td>
          {{item.price | currency:'USD':'symbol':'1.0-0'}}
        </td>
        <td>
          {{item.stock}}
        </td>
        <td>
          <button class="btn btn-primary" (click)="editProduct(item)">Editar</button>&nbsp;
          <button class="btn btn-danger" (click)="deleteProduct(item)">Eliminar</button>
        </td>
      </tr>
    }  
    </tbody>
  </table>
</div>
