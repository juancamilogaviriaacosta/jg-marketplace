<body>
   <!-- HEADER -->
   <div class="header">
      <div class="top-bar">
         <div class="logo" (click)="goToMainProducts()" style="cursor: pointer;">
            JG<span>Marketplace</span>
         </div>
         <div class="search-container">
            <input
               class="search-input"
               id="search"
               placeholder="Buscar productos..."
               >
            <button
               class="search-btn"
               >
            🔍
            </button>
         </div>
      </div>
      <div class="nav">
         <div class="nav-left">
            @if(auth.isUser()) {
               <a [routerLink]="['/cart']">Carrito</a>
            }
            
            @if(auth.isAdmin()) {
               <a [routerLink]="['/admin-products']">Administrar Productos</a>
               <a [routerLink]="['/admin-users']">Administrar Usuarios</a>
            }
         </div>
         <div class="nav-right">
            @if(auth.isloggedIn()) {
               <a (click)="auth.logout()" style="cursor: pointer;">Cerrar Sesión</a>
            } @else {
               <a [routerLink]="['/login']">Iniciar Sesión</a>
            }
         </div>
      </div>
   </div>   
</body>
<router-outlet />
