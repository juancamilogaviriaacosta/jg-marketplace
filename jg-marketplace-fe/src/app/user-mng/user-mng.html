<div class="container">

  <h2>Crear Usuario</h2>

  <form #productForm="ngForm" (ngSubmit)="saveUser(productForm)" autocomplete="off">

    <div>
      <label>Nombre</label>
      <input 
        type="text"
        name="name"
        [(ngModel)]="user.name"
        required>
    </div>

    <div>
      <label>Nombre de usuario</label>
      <input 
        type="text"
        name="username"
        [(ngModel)]="user.username"
        required>
    </div>

    <div>
      <label>Password</label>
      <input 
        type="password"
        name="password"
        [(ngModel)]="user.password"
        required>
    </div>

    <div>
      <label>Rol</label>
      <select
        name="role"
        [(ngModel)]="user.role"
        required>

        <option value="">Seleccione rol</option>
        <option value="admin">Admin</option>
        <option value="user">User</option>

      </select>
    </div>

    <br>

    <button type="submit" [disabled]="productForm.invalid">
      Guardar Producto
    </button>

  </form>

</div>
