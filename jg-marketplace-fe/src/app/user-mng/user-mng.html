<div class="container">

  <h2>Crear Usuario</h2>

  <form 
    #productForm="ngForm"
    (ngSubmit)="saveUser(productForm)"
    autocomplete="off">

    <!-- campo fantasma para engañar a Chrome -->
    <input type="text" name="fakeusernameremembered" style="display:none">
    <input type="password" name="fakepasswordremembered" style="display:none">

    <div>
      <label>Nombre</label>
      <input 
        type="text"
        name="name"
        [(ngModel)]="user.name"
        autocomplete="off"
        required>
    </div>

    <div>
      <label>Nombre de usuario</label>
      <input 
        type="text"
        name="username"
        [(ngModel)]="user.username"
        autocomplete="new-password"
        required>
    </div>

    <div>
      <label>Password</label>
      <input 
        type="password"
        name="password"
        [(ngModel)]="user.password"
        autocomplete="new-password"
        required>
    </div>

    <div>
      <label>Rol</label>
      <select
        name="role"
        [(ngModel)]="user.role"
        autocomplete="off"
        required>

        <option value="">Seleccione rol</option>
        <option value="admin">Admin</option>
        <option value="user">User</option>

      </select>
    </div>

    <br>

    <button type="submit" [disabled]="productForm.invalid">
      Guardar Usuario
    </button>

  </form>

</div>
